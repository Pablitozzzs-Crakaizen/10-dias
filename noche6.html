<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noche 6 - Suerte de Amor 🎲</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Poppins', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: url('f1.jpeg') no-repeat center center fixed; /* Volvemos a rotar tus fotos */
            background-size: cover;
            padding: 20px;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1;
        }

        /* Botones superiores */
        .btn-salir { position: fixed; top: 20px; right: 20px; z-index: 100; background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); color: white; text-decoration: none; padding: 8px 15px; border-radius: 12px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.3); }
        .btn-escucha { position: fixed; top: 20px; right: 100px; z-index: 100; background: #ff85a1; color: white; border: none; padding: 8px 15px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; animation: palpitar 2s infinite; }
        
        @keyframes palpitar { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            margin-top: 80px;
            text-align: center;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 2.5rem; color: #ff85a1; margin-bottom: 30px; }

        /* Estilo de la "Máquina de Mensajes" */
        .slot-machine {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        #mensaje-suerte {
            font-size: 1.3rem;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            font-weight: 300;
            font-style: italic;
            transition: all 0.5s ease;
        }

        .btn-lanzar {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: 0.3s;
        }

        .btn-lanzar:active { transform: scale(0.9); }

        .animando { animation: flash 0.2s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    </style>
</head>
<body>

    <div class="overlay"></div>
    
    <a href="index.html" class="btn-salir">Salir ×</a>
    <button class="btn-escucha" onclick="reproducirVoz()">ESCUCHA 💗🥺</button>
    <audio id="miVoz" src="audios/voz6.mp3"></audio>

    <div class="container">
        <h1>Tu Suerte de Hoy ✨</h1>
        
        <div class="slot-machine">
            <div id="mensaje-suerte">¿Qué te diré hoy? Presiona el botón...</div>
            <button class="btn-lanzar" onclick="generarMensaje()">Lanzar Destino 🎲</button>
        </div>

        <p style="margin-top: 30px; font-size: 0.8rem; opacity: 0.7;">Válido para un deseo antes de dormir.</p>
    </div>

    <script>
        const mensajes = [
            "Te debo muchos beshitoooooosss 💗🥺",
            "Mañana será un día increíble contigo ✨",
            "Eres lo más bonito de mi mundo 🌍",
            "Hoy soñaré contigo, ¡espero que tú también! 😴",
            "Gracias por estos 7 meses maravillosos 💖",
            "Eres mi persona favorita en todo el MUNDO por que tu eres mi MUNDO 🥺💗",
            "Vale por un abrazo de oso mañana 🧸"
        ];

        function generarMensaje() {
            const display = document.getElementById('mensaje-suerte');
            display.classList.add('animando');
            
            setTimeout(() => {
                const random = Math.floor(Math.random() * mensajes.length);
                display.classList.remove('animando');
                display.innerHTML = mensajes[random];
                display.style.color = "#ff85a1";
                display.style.fontWeight = "600";
            }, 1000);
        }

        function reproducirVoz() {
            const audio = document.getElementById('miVoz');
            const btn = document.querySelector('.btn-escucha');
            if (audio.paused) {
                audio.play();
                btn.innerHTML = "PAUSAR ⏸";
            } else {
                audio.pause();
                btn.innerHTML = "ESCUCHA 💗🥺";
            }
        }
    </script>
</body>
</html>
