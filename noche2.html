<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noche 2 - Una melodía para ti 🎶</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Poppins', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('f2.jpeg') no-repeat center center fixed;
            background-size: cover;
            padding: 20px;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1;
        }

        /* Botones superiores */
        .btn-salir { position: fixed; top: 20px; right: 20px; z-index: 100; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px); color: white; text-decoration: none; padding: 8px 15px; border-radius: 12px; font-size: 0.8rem; border: 1px solid rgba(255, 255, 255, 0.3); }
        
        .btn-escucha {
            position: fixed;
            top: 20px;
            right: 100px;
            z-index: 100;
            background: #ff85a1;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            animation: palpitar 2s infinite;
            cursor: pointer;
        }

        @keyframes palpitar { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* Tarjeta del Reproductor */
        .player-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .disco {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: url('f2.jpeg');
            background-size: cover;
            margin: 0 auto 20px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            animation: girar 10s linear infinite;
            animation-play-state: paused;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .playing .disco { animation-play-state: running; }

        @keyframes girar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h1 { font-family: 'Dancing Script', cursive; font-size: 2rem; color: #ff85a1; margin-bottom: 5px; }
        h2 { font-size: 0.9rem; font-weight: 300; margin-bottom: 20px; opacity: 0.8; }

        .play-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ff4d6d;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(255, 77, 109, 0.4);
        }

        .dedicatoria {
            font-size: 0.85rem;
            font-style: italic;
            line-height: 1.4;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <a href="index.html" class="btn-salir">Salir ×</a>
    <button class="btn-escucha" onclick="reproducirVoz()">ESCUCHA 💗🥺</button>

    <audio id="miVoz" src="audios/voz2.mp3"></audio>
    <audio id="cancion" src="musica.mp3"></audio>

    <div class="player-card" id="player">
        <div class="disco"></div>
        <h1>Aquel Nap ZzZz 🥺💗</h1>
        <h2>Dedicado para mi Amorshita</h2>

        <button class="play-btn" onclick="togglePlay()">▶</button>

        <div class="dedicatoria">
            "Escucha esta canción y piensa en mí antes de dormir. Eres el ritmo que le faltaba a mi vida. Te amo mushito. 💗"
        </div>
    </div>

    <script>
        const cancion = document.getElementById('cancion');
        const player = document.getElementById('player');
        const btnMusica = document.querySelector('.play-btn');

        function togglePlay() {
            if (cancion.paused) {
                cancion.play();
                player.classList.add('playing');
                btnMusica.innerHTML = '⏸';
            } else {
                cancion.pause();
                player.classList.remove('playing');
                btnMusica.innerHTML = '▶';
            }
        }

        function reproducirVoz() {
            const audioVoz = document.getElementById('miVoz');
            const btnVoz = document.querySelector('.btn-escucha');
            if (audioVoz.paused) {
                audioVoz.play();
                btnVoz.innerHTML = "PAUSAR ⏸";
            } else {
                audioVoz.pause();
                btnVoz.innerHTML = "ESCUCHA 💗🥺";
            }
        }
    </script>
</body>
</html>
